# nginx reverse proxy for Atlas (staging / self-hosted)
#
# MVP: self-signed certificate (certs/atlas.crt + certs/atlas.key)
# Production: swap for Let's Encrypt cert paths and add ACME challenge block.
#
# Generate a self-signed cert for local/internal use:
#   openssl req -x509 -nodes -days 3650 -newkey rsa:4096 \
#     -keyout nginx/certs/atlas.key \
#     -out  nginx/certs/atlas.crt \
#     -subj "/CN=atlas.company.internal"

# Redirect all plain HTTP to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name atlas.company.internal;

    ssl_certificate     /etc/nginx/certs/atlas.crt;
    ssl_certificate_key /etc/nginx/certs/atlas.key;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Backend API
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Health / readiness probes (no auth required)
    location ~ ^/(live|ready|health)$ {
        proxy_pass http://backend:8000;
    }

    # Frontend (everything else)
    location / {
        proxy_pass         http://frontend:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
