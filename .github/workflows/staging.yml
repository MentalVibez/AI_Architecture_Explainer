name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check staging secrets
        id: staging_secrets
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          if [ -z "$STAGING_HOST" ] || [ -z "$STAGING_USER" ] || [ -z "$STAGING_SSH_KEY" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Staging deploy skipped: STAGING_HOST, STAGING_USER, or STAGING_SSH_KEY is missing."
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to home server
        if: steps.staging_secrets.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /srv/atlas
            git pull origin main
            docker compose --env-file .env.staging up --build -d
            docker compose ps
            docker compose exec -T worker python -c "import os; os.kill(1, 0)"
            docker image prune -f

      - name: Smoke test
        if: steps.staging_secrets.outputs.configured == 'true'
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
        run: |
          for i in $(seq 1 12); do
            if curl -sf "http://${STAGING_HOST}:8000/ready" > /dev/null; then
              echo "Backend healthy after attempt $i"
              break
            fi
            echo "Attempt $i: not ready, retrying in 5s..."
            sleep 5
            if [ "$i" = "12" ]; then
              echo "Backend failed to become ready after 60s" && exit 1
            fi
          done

          for i in $(seq 1 12); do
            if curl -sf "http://${STAGING_HOST}:3000/health" > /dev/null; then
              echo "Frontend proxy healthy after attempt $i"
              exit 0
            fi
            echo "Attempt $i: frontend not ready, retrying in 5s..."
            sleep 5
            if [ "$i" = "12" ]; then
              echo "Frontend failed to become healthy after 60s" && exit 1
            fi
          done
