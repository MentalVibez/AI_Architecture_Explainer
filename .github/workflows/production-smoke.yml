name: Production Smoke

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Wait for public site readiness
        env:
          BASE_URL: https://www.codebaseatlas.com
        run: |
          for i in $(seq 1 18); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/health")
            if [ "$code" = "200" ]; then
              echo "Public site healthy after attempt $i"
              exit 0
            fi
            echo "Attempt $i: /health returned $code, retrying in 10s..."
            sleep 10
          done
          echo "Public site failed to become healthy after 180s" && exit 1

      - name: Run production smoke test
        working-directory: frontend
        env:
          BASE_URL: https://www.codebaseatlas.com
        run: node ./tests/e2e/production-smoke.mjs
